name: Resultados automáticos

on:
  # Sem schedule: o Cloudflare Worker (tools/scheduler/worker.js) é quem mantém o
  # results.json fresco — espelha cada FINISHED por commit, event-driven. Esta
  # Action fica só como rede de segurança MANUAL (rodar se o Worker estiver fora).
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Só simular (mostra o casamento nos logs, não commita)'
        type: boolean
        default: true

permissions:
  contents: write

concurrency:
  group: resultados
  cancel-in-progress: false

jobs:
  resultados:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '22'

      - name: Buscar e atualizar resultados
        env:
          FOOTBALL_API_KEY: ${{ secrets.FOOTBALL_API_KEY }}
          DRY_RUN: ${{ (github.event_name == 'workflow_dispatch' && inputs.dry_run) && '1' || '0' }}
          FORCE_FETCH: ${{ github.event_name == 'workflow_dispatch' && '1' || '0' }}
        run: node tools/results/fetch.mjs

      - name: Commitar se mudou
        run: |
          if [ -n "$(git status --porcelain data/results.json)" ]; then
            git config user.name "bolao-bot"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add data/results.json
            git commit -m "Resultados automáticos (football-data.org)"
            git push
          else
            echo "Sem mudanças em results.json."
          fi
