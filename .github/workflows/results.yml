name: Resultados automáticos

on:
  schedule:
    # >>> agenda gerada (gen-schedule.mjs) — não edite à mão >>>
    # 48 disparos/dia nos términos (UTC) derivados do fixtures.json. Regerar: node tools/results/gen-schedule.mjs
    - cron: '10 0 * * *'
    - cron: '25 0 * * *'
    - cron: '40 0 * * *'
    - cron: '55 0 * * *'
    - cron: '10 1 * * *'
    - cron: '25 1 * * *'
    - cron: '40 1 * * *'
    - cron: '55 1 * * *'
    - cron: '10 2 * * *'
    - cron: '25 2 * * *'
    - cron: '40 2 * * *'
    - cron: '55 2 * * *'
    - cron: '10 3 * * *'
    - cron: '25 3 * * *'
    - cron: '40 3 * * *'
    - cron: '55 3 * * *'
    - cron: '10 4 * * *'
    - cron: '25 4 * * *'
    - cron: '40 4 * * *'
    - cron: '55 4 * * *'
    - cron: '10 5 * * *'
    - cron: '25 5 * * *'
    - cron: '40 5 * * *'
    - cron: '55 5 * * *'
    - cron: '10 6 * * *'
    - cron: '25 6 * * *'
    - cron: '40 6 * * *'
    - cron: '55 17 * * *'
    - cron: '10 18 * * *'
    - cron: '25 18 * * *'
    - cron: '40 18 * * *'
    - cron: '55 18 * * *'
    - cron: '10 19 * * *'
    - cron: '25 19 * * *'
    - cron: '40 19 * * *'
    - cron: '55 20 * * *'
    - cron: '10 21 * * *'
    - cron: '25 21 * * *'
    - cron: '40 21 * * *'
    - cron: '55 21 * * *'
    - cron: '10 22 * * *'
    - cron: '25 22 * * *'
    - cron: '40 22 * * *'
    - cron: '55 22 * * *'
    - cron: '10 23 * * *'
    - cron: '25 23 * * *'
    - cron: '40 23 * * *'
    - cron: '55 23 * * *'
    # <<< agenda gerada <<<
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Só simular (mostra o casamento nos logs, não commita)'
        type: boolean
        default: true

permissions:
  contents: write

concurrency:
  group: resultados
  cancel-in-progress: false

jobs:
  resultados:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Buscar e atualizar resultados
        env:
          FOOTBALL_API_KEY: ${{ secrets.FOOTBALL_API_KEY }}
          DRY_RUN: ${{ (github.event_name == 'workflow_dispatch' && inputs.dry_run) && '1' || '0' }}
          FORCE_FETCH: ${{ github.event_name == 'workflow_dispatch' && '1' || '0' }}
        run: node tools/results/fetch.mjs

      - name: Commitar se mudou
        run: |
          if [ -n "$(git status --porcelain data/results.json)" ]; then
            git config user.name "bolao-bot"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add data/results.json
            git commit -m "Resultados automáticos (football-data.org)"
            git push
          else
            echo "Sem mudanças em results.json."
          fi
