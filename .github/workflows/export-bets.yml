name: Exportar palpites (Supabase → bets.json)

# LIGADO no go-live (28/06/2026): roda a cada 15 min (schedule) escrevendo de
# verdade, e ainda dá pra acionar manualmente (workflow_dispatch, dry-run por
# padrão). O cron só leva os palpites JÁ TRAVADOS do Supabase pro bets.json — o
# frescor do placar ao vivo vem do polling direto da tabela results (ver app.js).
on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Só simular (não commita bets.json)'
        type: boolean
        default: true

permissions:
  contents: write

concurrency:
  group: export-bets
  cancel-in-progress: false

jobs:
  export:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '22'

      - name: Exportar palpites travados
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          DRY_RUN: ${{ (github.event_name == 'workflow_dispatch' && inputs.dry_run) && '1' || '0' }}
        run: node tools/export-bets.mjs

      - name: Commitar se mudou
        if: ${{ !(github.event_name == 'workflow_dispatch' && inputs.dry_run) }}
        run: |
          if [ -n "$(git status --porcelain data/bets.json)" ]; then
            git config user.name "bolao-bot"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add data/bets.json
            git commit -m "Palpites (export do Supabase)"
            git push
          else
            echo "Sem mudanças em bets.json."
          fi
