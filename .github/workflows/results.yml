name: Resultados automáticos

on:
  schedule:
    # Só na faixa UTC em que saem placares (~18:00–06:30 UTC; jogos 13h–1h BRT).
    # De 5 em 5 min para pegar o resultado logo após o apito; a guarda no script
    # zera o custo nas batidas sem jogo a fechar. Rever quando entrar o mata-mata.
    - cron: '*/5 17-23 * * *'
    - cron: '*/5 0-7 * * *'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Só simular (mostra o casamento nos logs, não commita)'
        type: boolean
        default: true

permissions:
  contents: write

concurrency:
  group: resultados
  cancel-in-progress: false

jobs:
  resultados:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Buscar e atualizar resultados
        env:
          FOOTBALL_API_KEY: ${{ secrets.FOOTBALL_API_KEY }}
          DRY_RUN: ${{ (github.event_name == 'workflow_dispatch' && inputs.dry_run) && '1' || '0' }}
          FORCE_FETCH: ${{ github.event_name == 'workflow_dispatch' && '1' || '0' }}
        run: node tools/results/fetch.mjs

      - name: Commitar se mudou
        run: |
          if [ -n "$(git status --porcelain data/results.json)" ]; then
            git config user.name "bolao-bot"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add data/results.json
            git commit -m "Resultados automáticos (football-data.org)"
            git push
          else
            echo "Sem mudanças em results.json."
          fi
